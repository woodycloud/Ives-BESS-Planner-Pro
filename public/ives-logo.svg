<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="ivesBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5F7FB" />
      <stop offset="100%" stop-color="#E2E8F0" />
    </linearGradient>
    <linearGradient id="ivesBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E64B8" />
      <stop offset="50%" stop-color="#0F4C9B" />
      <stop offset="100%" stop-color="#0A2C5C" />
    </linearGradient>
    <linearGradient id="ivesHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA" />
      <stop offset="100%" stop-color="#1D4ED8" />
    </linearGradient>
    <filter id="ivesGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0B3C7D" flood-opacity="0.2" />
    </filter>
  </defs>
  <!-- Background metallic squircle card -->
  <rect x="24" y="24" width="464" height="464" rx="100" fill="url(#ivesBg)" stroke="#FFFFFF" stroke-width="8" filter="url(#ivesGlow)"/>
  
  <!-- Outer Headphone Arch -->
  <path d="M 125 275 C 125 155, 387 155, 387 275" fill="none" stroke="url(#ivesBlue)" stroke-width="26" stroke-linecap="round" />
  <path d="M 137 265 C 137 170, 375 170, 375 265" fill="none" stroke="url(#ivesHighlight)" stroke-width="6" stroke-linecap="round" opacity="0.8" />
  
  <!-- Left Earcup -->
  <rect x="102" y="255" width="30" height="75" rx="15" fill="url(#ivesBlue)"/>
  <rect x="120" y="263" width="12" height="59" rx="6" fill="url(#ivesHighlight)"/>
  
  <!-- Right Earcup -->
  <rect x="380" y="255" width="30" height="75" rx="15" fill="url(#ivesBlue)"/>
  <rect x="380" y="263" width="12" height="59" rx="6" fill="url(#ivesHighlight)"/>

  <!-- Top "T" mark above IVES -->
  <path d="M 235 185 H 277 M 256 185 V 245" stroke="url(#ivesBlue)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- "IVES" Typography -->
  <!-- I -->
  <path d="M 160 260 V 380" stroke="url(#ivesBlue)" stroke-width="22" stroke-linecap="round"/>
  <!-- V -->
  <path d="M 195 260 L 235 380 L 275 260" stroke="url(#ivesBlue)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- E -->
  <path d="M 290 260 H 335 M 290 320 H 325 M 290 380 H 335 M 290 260 V 380" stroke="url(#ivesBlue)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- S -->
  <path d="M 375 285 C 340 255, 340 320, 360 330 C 380 340, 380 395, 340 375" fill="none" stroke="url(#ivesBlue)" stroke-width="18" stroke-linecap="round"/>
</svg>
